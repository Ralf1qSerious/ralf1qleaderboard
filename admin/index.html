<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Admin Login</title>
  <link rel="stylesheet" href="/assets/css/style.css">
</head>
<body>
  <div class="bg-vignette"></div>
  <canvas id="fxCanvas"></canvas>

  <div class="container center-page">
    <div style="max-width:520px;width:100%;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:18px;padding:22px;box-shadow:var(--shadow)">
      <h2 style="font-size:32px;margin-bottom:8px">Admin</h2>
      <p class="muted" style="margin-bottom:14px">Password protects the editor. On static hosting, saving downloads a new config.json.</p>

      <input id="pw" type="password" placeholder="Password"
        style="width:100%;padding:12px 14px;border-radius:12px;border:1px solid rgba(255,255,255,.10);background:rgba(0,0,0,.35);color:#fff;outline:none" />

      <div style="display:flex;gap:10px;margin-top:12px;justify-content:flex-end">
        <a href="/"><button style="background:rgba(255,255,255,.10);color:#fff;border:1px solid rgba(255,255,255,.12)">Back</button></a>
        <button id="loginBtn">Login</button>
      </div>

      <div id="msg" class="muted" style="margin-top:10px"></div>
    </div>
  </div>

  <script type="module" src="/assets/js/admin.js"></script>
</body>
</html>
